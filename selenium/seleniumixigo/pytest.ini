[pytest]
markers =
    search: Flight search flow tests
    booking: Booking and traveller form tests
    payment: Add-ons and payment tests
    negative: Negative/boundary test cases expected to fail

testpaths = tests

addopts = --tb=short
          -s
          -v
          --order-scope=class
          --alluredir="reports/allure-results"
          --html=reports/report.html
          --self-contained-html

render_collapsed = failed,error

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S